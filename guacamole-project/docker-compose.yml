services:
  guacd:
    image: guacamole/guacd:1.6.0
    container_name: guacamole-guacd
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "sh", "-c", "nc -z localhost 4822"]
      interval: 10s
      timeout: 5s
      retries: 5

  postgres:
    image: postgres:16-alpine
    container_name: guacamole-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GUACAMOLE_DB_NAME}
      POSTGRES_USER: ${GUACAMOLE_DB_USER}
      POSTGRES_PASSWORD: ${GUACAMOLE_DB_PASSWORD}
    volumes:
      - guacamole_db_data:/var/lib/postgresql/data
      - ./initdb:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${GUACAMOLE_DB_USER} -d ${GUACAMOLE_DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  guacamole:
    image: guacamole/guacamole:1.6.0
    container_name: guacamole-app
    restart: unless-stopped
    depends_on:
      guacd:
        condition: service_started
      postgres:
        condition: service_healthy
    ports:
      - "${GUACAMOLE_HTTP_PORT}:8080"
    environment:
      WEBAPP_CONTEXT: ROOT
      GUACD_HOSTNAME: guacd
      POSTGRESQL_ENABLED: "true"
      POSTGRESQL_HOSTNAME: postgres
      POSTGRESQL_DATABASE: ${GUACAMOLE_DB_NAME}
      POSTGRESQL_USERNAME: ${GUACAMOLE_DB_USER}
      POSTGRESQL_PASSWORD: ${GUACAMOLE_DB_PASSWORD}
volumes:
  guacamole_db_data:
